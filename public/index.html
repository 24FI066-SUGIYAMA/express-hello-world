<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <style>
      /* --- 元のデザインを維持 --- */
      .chat {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .form {
        display: flex;
      }
      
      /* 名前入力欄のスタイル（すっきり並ぶように調整） */
      .name-input {
        width: 120px;
        padding: 10px;
        border: 1px solid #ccc;
        border-right: none;
        outline: none;
      }
      
      .input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        outline: none;
      }
      .submit {
        padding: 10px;
        border: 1px solid #ccc;
        background: #eee;
        cursor: pointer;
      }

      /* --- リアクション用のスタイル --- */
      .message-item {
        position: relative;
        padding: 10px 15px;
        border-bottom: 1px solid #f0f0f0;
      }
      .message-item:hover {
        background-color: #fafafa;
      }

      .message-actions {
        display: none;
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 2px 4px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        z-index: 5;
      }
      .message-item:hover .message-actions {
        display: flex;
        gap: 3px;
      }
      .action-emoji-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 2px 4px;
        font-size: 1rem;
        border-radius: 3px;
      }
      .action-emoji-btn:hover {
        background: #eee;
      }

      .reactions-list {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 5px;
      }
      .reaction-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: #f1f3f4;
        border: 1px solid #dadce0;
        padding: 2px 6px;
        border-radius: 12px;
        font-size: 0.75rem;
        cursor: pointer;
        user-select: none;
      }
      .reaction-badge:hover {
        background: #e8eaed;
      }
      .reaction-badge.active {
        background: #e8f0fe;
        border-color: #1a73e8;
        color: #1a73e8;
      }
      .reaction-badge .count {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="chat">
      <ul class="messages"></ul>
      <form class="form">
        <!-- 名前の入力欄を追加（初期状態はランダムIDを表示） -->
        <input class="name-input" placeholder="名前" autocomplete="off" />
        <input class="input" placeholder="メッセージを入力..." autocomplete="off" />
        <button class="submit">Send</button>
      </form>
    </div>

    <script>
      function main() {
        const host = location.origin.replace(/^http/, 'ws')
        const ws = new WebSocket(host + '/ws')
        
        // セキュアコンテキスト外でも動作する安全なID生成
        let myId
        if (typeof self !== 'undefined' && self.crypto && typeof self.crypto.randomUUID === 'function') {
          myId = self.crypto.randomUUID().slice(0, 8)
        } else {
          myId = Math.random().toString(36).substring(2, 10)
        }

        const form = document.querySelector('.form')
        const nameInput = document.querySelector('.name-input')
        const input = document.querySelector('.input')

        // 初期表示の名前を設定
        nameInput.value = myId

        form.onsubmit = function (e) {
          e.preventDefault()
          const text = input.value
          const nickname = nameInput.value.trim() || myId // 空白ならIDを代用
          
          if (text.trim() === '') return

          // リアクション紐付け用のメッセージID
          const messageId = 'msg-' + Date.now() + '-' + Math.random().toString(36).substring(2, 7)

          ws.send(JSON.stringify({ 
            type: 'chat', 
            messageId: messageId, 
            id: myId, 
            name: nickname, // 送信メッセージに名前を含める
            text: text 
          }))

          input.value = ''
          input.focus()
        }

        const reactionStates = {}

        window.sendReaction = function (messageId, emoji) {
          ws.send(JSON.stringify({
            type: 'reaction',
            messageId: messageId,
            emoji: emoji,
            id: myId
          }))
        }

        ws.onmessage = function (msg) {
          try {
            const data = JSON.parse(msg.data)
            
            // 1. チャットメッセージの受信処理
            if (data.type === 'chat' && data.messageId && data.id && data.text) {
              const { id, text, messageId, name } = data
              const messageList = document.querySelector('.messages')
              
              const li = document.createElement('li')
              li.className = 'message-item'
              li.setAttribute('data-message-id', messageId)

              // メッセージのテキスト部分
              const textSpan = document.createElement('span')
              textSpan.className = 'message-text'
              
              // 設定されている名前があればそれを利用。なければIDを表示
              const displayName = name || id
              if (id === myId) {
                textSpan.textContent = `(${displayName})自分: ` + text
              } else {
                textSpan.textContent = displayName + ': ' + text
              }
              li.appendChild(textSpan)

              // クイックリアクションツールバー
              const actions = document.createElement('div')
              actions.className = 'message-actions'
              const emojiList = ['👍', '❤️', '🔥', '😆', '🙏']
              emojiList.forEach(emoji => {
                const btn = document.createElement('button')
                btn.className = 'action-emoji-btn'
                btn.textContent = emoji
                btn.onclick = () => window.sendReaction(messageId, emoji)
                actions.appendChild(btn)
              })
              li.appendChild(actions)

              // リアクションバッジ用コンテナ
              const reactionContainer = document.createElement('div')
              reactionContainer.className = 'reactions-list'
              li.appendChild(reactionContainer)

              messageList.appendChild(li)
              messageList.scrollTop = messageList.scrollHeight
            }
            
            // 2. リアクションイベントの受信処理
            else if (data.type === 'reaction' && data.messageId && data.emoji && data.id) {
              const { messageId, emoji, id: senderId } = data
              
              const messageEl = document.querySelector(`[data-message-id="${messageId}"]`)
              if (!messageEl) return

              const reactionContainer = messageEl.querySelector('.reactions-list')

              if (!reactionStates[messageId]) reactionStates[messageId] = {}
              if (!reactionStates[messageId][emoji]) reactionStates[messageId][emoji] = new Set()

              const userSet = reactionStates[messageId][emoji]

              if (userSet.has(senderId)) {
                userSet.delete(senderId)
              } else {
                userSet.add(senderId)
              }

              let badge = reactionContainer.querySelector(`[data-emoji="${emoji}"]`)

              if (userSet.size === 0) {
                if (badge) badge.remove()
              } else {
                if (!badge) {
                  badge = document.createElement('span')
                  badge.className = 'reaction-badge'
                  badge.setAttribute('data-emoji', emoji)
                  badge.onclick = () => window.sendReaction(messageId, emoji)
                  badge.innerHTML = `<span class="emoji">${emoji}</span> <span class="count">0</span>`
                  reactionContainer.appendChild(badge)
                }

                badge.querySelector('.count').textContent = userSet.size
                if (userSet.has(myId)) {
                  badge.classList.add('active')
                } else {
                  badge.classList.remove('active')
                }
              }
            }
          } catch (error) {
            console.error('Failed to parse WebSocket message:', error, msg.data)
          }
        }

        ws.onerror = function (error) {
          console.error('WebSocket Error: ', error)
        }
      }

      main()
    </script>
  </body>
</html>
